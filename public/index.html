<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bouquet Generator — Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="p-4">
    <div class="container">
      <h1 class="mb-3">Bouquet Generator Demo</h1>

      <form id="bouquetForm" class="mb-3">
        <div class="mb-3">
          <label for="flowers" class="form-label"
            >Flowers (comma separated)</label
          >
          <input
            id="flowers"
            class="form-control"
            value="Februari,April,Augustus,December"
            aria-describedby="flowersHelp"
          />
          <div id="flowersHelp" class="form-text">
            Enter flower names separated by commas (e.g., "Februari,April").
          </div>
        </div>

        <div class="mb-3">
          <label for="charmShape" class="form-label"
            >Charm Shape (optional)</label
          >
          <select id="charmShape" class="form-select">
            <option value="coin">coin</option>
            <option value="round">round</option>
            <option value="heart">heart</option>
            <option value="oval">oval</option>
            <option value="poster">poster</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="posterTitle" class="form-label">Poster title (optional)</label>
          <input id="posterTitle" class="form-control" placeholder="e.g. Birth Flowers" />
        </div>
        <div class="mb-3">
          <label for="posterNames" class="form-label">Poster names (optional)</label>
          <input id="posterNames" class="form-control" placeholder="e.g. Emma & John" />
        </div>

        <div class="mb-3">
          <button type="submit" class="btn btn-primary" id="generateBtn">
            Generate
          </button>
          <button type="button" class="btn btn-success ms-2" id="posterBtn">
            Generate & Download Poster PDF
          </button>
        </div>
      </form>

      <div id="status" class="mb-3" aria-live="polite"></div>

      <div
        id="svgContainer"
        class="border p-0"
        style="
          min-height: 200px;
          border-radius: 50%;
          background: #eee;
          width: 400px;
          height: 400px;
        "
      ></div>
    </div>

    <script>
      const form = document.getElementById('bouquetForm');
      const status = document.getElementById('status');
      const container = document.getElementById('svgContainer');
      const charmShapeSelect = document.getElementById('charmShape');

      const CONTAINER_DIMENSIONS = {
        coin: { width: 400, height: 400 },
        round: { width: 640, height: 400 },
        oval: { width: 400, height: 720 },
        heart: { width: 600, height: 400 },
        poster: { width: 400, height: 400 },
      };

      /** Symmetrical heart path for clip-path — ratio 24:16, size 600×400 */
      const HEART_PATH =
        'M 300 335 C 150 275 60 195 90 115 C 112.5 55 195 35 300 80 C 405 35 487.5 55 510 115 C 540 195 450 275 300 335 Z';

      function updateContainerShape(charmShape) {
        const dim =
          CONTAINER_DIMENSIONS[charmShape] ?? CONTAINER_DIMENSIONS.coin;
        container.style.width = dim.width + 'px';
        container.style.height = dim.height + 'px';

        if (charmShape === 'heart') {
          container.style.borderRadius = '';
          container.style.clipPath = 'path("' + HEART_PATH + '")';
          container.style.webkitClipPath = 'path("' + HEART_PATH + '")';
          container.style.border = '1px solid #aaa';
        } else {
          container.style.clipPath = '';
          container.style.webkitClipPath = '';
          container.style.border = '';
          container.style.borderRadius =
            dim.width === dim.height ? '50%' : '50%';
        }
      }

      charmShapeSelect.addEventListener('change', () => {
        updateContainerShape(charmShapeSelect.value);
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        status.textContent = '';
        container.innerHTML = '';

        const charmShapeVal = charmShapeSelect.value;
        updateContainerShape(charmShapeVal);

        const flowersStr = document.getElementById('flowers').value;
        const flowers = flowersStr
          .split(',')
          .map((s) => s.trim())
          .filter(Boolean);
        const body = { flowers };
        if (charmShapeVal) body.charmShape = charmShapeVal;

        try {
          status.innerHTML =
            '<div class="spinner-border spinner-border-sm" role="status"></div> Generating...';

          const res = await fetch('/api/bouquet', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Accept: 'application/json',
            },
            body: JSON.stringify(body),
          });

          if (!res.ok) {
            let errBody;
            try {
              const j = await res.json();
              errBody = j && (j.error || j.message || JSON.stringify(j));
            } catch (_) {
              try {
                errBody = await res.text();
              } catch (_) {
                errBody = '';
              }
            }

            throw new Error(
              'Server error ' + res.status + (errBody ? ': ' + errBody : ''),
            );
          }

          const result = await res.json();
          const svgText =
            result &&
            (result.svg || (typeof result === 'string' ? result : ''));

          if (!svgText) {
            throw new Error('No SVG returned in response');
          }

          container.innerHTML = svgText;
          const svgEl = container.querySelector('svg');
          if (svgEl) {
            const dim =
              CONTAINER_DIMENSIONS[charmShapeVal] ?? CONTAINER_DIMENSIONS.coin;
            svgEl.setAttribute('width', dim.width + 'px');
            svgEl.setAttribute('height', dim.height + 'px');
          }

          const svgFilename = result.filename || 'bouquet.svg';
          status.innerHTML = '<span class="text-success">SVG received</span>';

          const blob = new Blob([container.innerHTML], {
            type: 'image/svg+xml',
          });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = svgFilename;
          a.textContent = 'Download SVG';
          a.className = 'btn btn-outline-secondary btn-sm ms-2';
          status.appendChild(a);
        } catch (err) {
          status.innerHTML =
            '<span class="text-danger">Error: ' +
            (err.message || err) +
            '</span>';
        }
      });

      document.getElementById('posterBtn').addEventListener('click', async () => {
        status.textContent = '';
        const flowersStr = document.getElementById('flowers').value;
        const flowers = flowersStr
          .split(',')
          .map((s) => s.trim())
          .filter(Boolean);
        const title = document.getElementById('posterTitle').value.trim() || undefined;
        const names = document.getElementById('posterNames').value.trim() || undefined;

        if (flowers.length < 1 || flowers.length > 5) {
          status.innerHTML = '<span class="text-danger">Enter 1–5 flowers.</span>';
          return;
        }

        try {
          status.innerHTML =
            '<div class="spinner-border spinner-border-sm" role="status"></div> Generating poster...';

          const res = await fetch('/api/poster', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Accept: 'application/json',
            },
            body: JSON.stringify({ flowers, title, names }),
          });

          if (!res.ok) {
            let errBody;
            try {
              const j = await res.json();
              errBody = j && (j.error || j.message || JSON.stringify(j));
            } catch (_) {
              try {
                errBody = await res.text();
              } catch (_) {
                errBody = '';
              }
            }
            throw new Error(
              'Server error ' + res.status + (errBody ? ': ' + errBody : ''),
            );
          }

          const result = await res.json();
          const pdfBase64 = result && result.pdf;
          if (!pdfBase64) {
            throw new Error('No PDF returned in response');
          }

          const binary = atob(pdfBase64);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          const blob = new Blob([bytes], { type: 'application/pdf' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = result.filename || 'poster.pdf';
          a.click();
          URL.revokeObjectURL(url);

          status.innerHTML = '<span class="text-success">Poster downloaded</span>';
        } catch (err) {
          status.innerHTML =
            '<span class="text-danger">Error: ' +
            (err.message || err) +
            '</span>';
        }
      });
    </script>
  </body>
</html>
